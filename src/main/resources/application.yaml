spring:
  application:
    name: DispatchDeliveryApp
  jackson:
    default-property-inclusion: non_null
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:postgresql://${DATABASE_URL:localhost}:${DATABASE_PORT:5432}/dispatchdelivery
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: ${INIT_DB:always}
      schema-locations: "classpath:database-init.sql"
logging:
  level:
    org.apache.coyote.http11.Http11InputBuffer: TRACE # Incoming HTTP requests
    org.springframework.jdbc.datasource.init: DEBUG
    org.springframework.jdbc.core: DEBUG # SQL
mock-delivery:
  enabled: true
  tick-interval-ms: 5000
jwt:
  secret: ${JWT_SECRET:dispatch-delivery-app-jwt-secret-key-change-in-production}
  expiration-ms: 86400000
order-assignment:
  min-battery-level: 20
  delivery-speed: 10.0
